<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        color: var(--figma-color-text, #333);
        background: var(--figma-color-bg, #fff);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ---- Header ---- */
      .header {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-bottom: 1px solid var(--figma-color-border, #e5e5e5);
        flex-shrink: 0;
      }

      .search-row {
        display: flex;
        gap: 8px;
      }

      .search-input {
        flex: 1;
        height: 32px;
        padding: 0 10px;
        border: 1px solid var(--figma-color-border, #e5e5e5);
        border-radius: 6px;
        font-size: 12px;
        color: var(--figma-color-text, #333);
        background: var(--figma-color-bg, #fff);
        outline: none;
        transition: border-color 0.15s;
      }

      .search-input:focus {
        border-color: var(--figma-color-border-brand, #18a0fb);
      }

      .search-input::placeholder {
        color: var(--figma-color-text-tertiary, #999);
      }

      .category-select {
        height: 32px;
        padding: 0 8px;
        border: 1px solid var(--figma-color-border, #e5e5e5);
        border-radius: 6px;
        font-size: 11px;
        color: var(--figma-color-text, #333);
        background: var(--figma-color-bg, #fff);
        outline: none;
        cursor: pointer;
        max-width: 130px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        color: var(--figma-color-text-secondary, #666);
      }

      .status-bar a {
        color: var(--figma-color-text-brand, #18a0fb);
        text-decoration: none;
        font-size: 11px;
      }

      .status-bar a:hover {
        text-decoration: underline;
      }

      /* ---- Loading ---- */
      .loading {
        display: none;
        align-items: center;
        justify-content: center;
        padding: 40px;
        flex: 1;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid var(--figma-color-border, #e5e5e5);
        border-top-color: var(--figma-color-border-brand, #18a0fb);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ---- Grid ---- */
      .grid-container {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .icon-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 4px 6px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: var(--figma-color-bg-secondary, #f5f5f5);
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      .icon-card:hover {
        border-color: var(--figma-color-border-brand, #18a0fb);
        background: var(--figma-color-bg-hover, #eef);
      }

      .icon-card:active {
        transform: scale(0.95);
      }

      .icon-card.inserting {
        opacity: 0.5;
        pointer-events: none;
      }

      .icon-preview {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-preview img {
        max-width: 32px;
        max-height: 32px;
        object-fit: contain;
      }

      .icon-name {
        font-size: 10px;
        text-align: center;
        line-height: 1.2;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--figma-color-text-secondary, #666);
      }

      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 16px;
        color: var(--figma-color-text-tertiary, #999);
        font-size: 12px;
      }

      /* ---- Scrollbar ---- */
      .grid-container::-webkit-scrollbar {
        width: 6px;
      }

      .grid-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .grid-container::-webkit-scrollbar-thumb {
        background: var(--figma-color-border, #ddd);
        border-radius: 3px;
      }

      .grid-container::-webkit-scrollbar-thumb:hover {
        background: var(--figma-color-text-tertiary, #999);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="search-row">
        <input
          id="search"
          class="search-input"
          type="text"
          placeholder="Search 4,000+ brand icons..."
          autofocus
        />
        <select id="category" class="category-select">
          <option value="all">All</option>
        </select>
      </div>
      <div class="status-bar">
        <span id="status">Loading...</span>
        <a href="https://thesvg.org" target="_blank">thesvg.org</a>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <div class="grid-container">
      <div id="grid" class="grid"></div>
    </div>

    <!-- SCRIPT_PLACEHOLDER -->
  </body>
</html>
