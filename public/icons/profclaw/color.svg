<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <title>profClaw</title>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <!-- Body with gradient -->
  <ellipse cx="12" cy="13" rx="5.8" ry="5.3" fill="url(#body)"/>
  <!-- Belly highlight -->
  <ellipse cx="11.5" cy="11.8" rx="3.1" ry="2.2" fill="#fda4af" opacity=".15"/>
  <!-- Legs -->
  <rect x="9.4" y="17.5" width="1.9" height="2.4" rx="1" fill="#be123c"/>
  <rect x="12.7" y="17.5" width="1.9" height="2.4" rx="1" fill="#be123c"/>
  <!-- Left claw + chevron -->
  <ellipse cx="4.8" cy="13" rx="1.9" ry="1.4" fill="#be123c"/>
  <path d="M3.6,11.8 L4.8,13 L6,11.8" stroke="#4c0519" stroke-width=".43" fill="none" stroke-linecap="round"/>
  <!-- Right claw + chevron -->
  <ellipse cx="19.2" cy="13" rx="1.9" ry="1.4" fill="#be123c"/>
  <path d="M18,11.8 L19.2,13 L20.4,11.8" stroke="#4c0519" stroke-width=".43" fill="none" stroke-linecap="round"/>
  <!-- Left antenna -->
  <line x1="9.4" y1="8.2" x2="7.4" y2="4.8" stroke="#be123c" stroke-width=".55" stroke-linecap="round"/>
  <circle cx="7.2" cy="4.3" r=".85" fill="#fda4af"/>
  <circle cx="7.2" cy="4.3" r=".32" fill="#fff" opacity=".35"/>
  <!-- Right antenna -->
  <line x1="14.6" y1="8.2" x2="16.6" y2="4.8" stroke="#be123c" stroke-width=".55" stroke-linecap="round"/>
  <circle cx="16.8" cy="4.3" r=".85" fill="#fda4af"/>
  <circle cx="16.8" cy="4.3" r=".32" fill="#fff" opacity=".35"/>
  <!-- Eyes -->
  <circle cx="10.3" cy="12.2" r="1.6" fill="#fff"/>
  <circle cx="13.7" cy="12.2" r="1.6" fill="#fff"/>
  <circle cx="10.7" cy="12" r=".85" fill="#4c0519"/>
  <circle cx="14.1" cy="12" r=".85" fill="#4c0519"/>
  <circle cx="11" cy="11.6" r=".34" fill="#fff"/>
  <circle cx="14.4" cy="11.6" r=".34" fill="#fff"/>
  <circle cx="10.3" cy="12.6" r=".17" fill="#fff" opacity=".3"/>
  <circle cx="13.7" cy="12.6" r=".17" fill="#fff" opacity=".3"/>
  <!-- Smile -->
  <path d="M10.8,15.1 Q12,16.3 13.7,14.9" stroke="#9f1239" stroke-width=".5" fill="none" stroke-linecap="round"/>
</svg>
